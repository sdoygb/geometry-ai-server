<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>几何论 - 成果分享</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif; background: #0f0f0f; color: #e0e0e0; min-height: 100vh; }
.header { background: linear-gradient(135deg, #1a1a2e, #16213e); padding: 20px 40px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; }
.header h1 { font-size: 24px; color: #fff; }
.header h1 a { color: #fff; text-decoration: none; }
.header .nav a { color: #aaa; text-decoration: none; margin-left: 20px; font-size: 14px; }
.header .nav a:hover, .header .nav a.active { color: #4fc3f7; }
.container { max-width: 900px; margin: 0 auto; padding: 20px; }

/* 搜索栏 */
.search-bar { display: flex; gap: 10px; margin-bottom: 20px; }
.search-bar input { flex: 1; padding: 10px 15px; background: #1a1a1a; border: 1px solid #333; border-radius: 8px; color: #fff; font-size: 14px; }
.search-bar input:focus { outline: none; border-color: #4fc3f7; }
.search-bar select { padding: 10px 15px; background: #1a1a1a; border: 1px solid #333; border-radius: 8px; color: #fff; font-size: 14px; }
.search-bar button { padding: 10px 20px; background: #4fc3f7; color: #000; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
.search-bar button:hover { background: #81d4fa; }

/* 文章列表 */
.article-list { display: flex; flex-direction: column; gap: 15px; }
.article-card { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 12px; padding: 20px; cursor: pointer; transition: all 0.2s; }
.article-card:hover { border-color: #4fc3f7; transform: translateY(-2px); box-shadow: 0 4px 20px rgba(79,195,247,0.1); }
.article-card h3 { font-size: 18px; color: #fff; margin-bottom: 8px; }
.article-card .meta { font-size: 12px; color: #888; margin-bottom: 10px; display: flex; gap: 15px; }
.article-card .meta span { display: flex; align-items: center; gap: 4px; }

/* 文章详情 */
.detail-view { display: none; }
.detail-view .back-btn { display: inline-block; margin-bottom: 20px; color: #4fc3f7; cursor: pointer; font-size: 14px; }
.detail-view .back-btn:hover { text-decoration: underline; }
.detail-view h2 { font-size: 24px; color: #fff; margin-bottom: 10px; }
.detail-view .meta { font-size: 13px; color: #888; margin-bottom: 20px; display: flex; gap: 15px; }
.detail-view .content { line-height: 1.8; font-size: 15px; color: #ccc; white-space: pre-wrap; word-wrap: break-word; }
.detail-view .like-btn { margin-top: 20px; padding: 10px 25px; background: #1a1a1a; border: 1px solid #4fc3f7; color: #4fc3f7; border-radius: 8px; cursor: pointer; font-size: 14px; }
.detail-view .like-btn:hover { background: #4fc3f7; color: #000; }

/* 上传表单 */
.upload-view { display: none; }
.upload-view h2 { font-size: 22px; color: #fff; margin-bottom: 20px; }
.upload-view label { display: block; font-size: 14px; color: #aaa; margin-bottom: 5px; margin-top: 15px; }
.upload-view input, .upload-view textarea, .upload-view select { width: 100%; padding: 10px 15px; background: #1a1a1a; border: 1px solid #333; border-radius: 8px; color: #fff; font-size: 14px; font-family: inherit; }
.upload-view textarea { min-height: 300px; resize: vertical; line-height: 1.6; }
.upload-view input:focus, .upload-view textarea:focus { outline: none; border-color: #4fc3f7; }
.upload-view .submit-btn { margin-top: 20px; padding: 12px 30px; background: #4fc3f7; color: #000; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold; }
.upload-view .submit-btn:hover { background: #81d4fa; }

/* 分页 */
.pagination { display: flex; justify-content: center; gap: 8px; margin-top: 20px; }
.pagination button { padding: 6px 14px; background: #1a1a1a; border: 1px solid #333; color: #ccc; border-radius: 6px; cursor: pointer; }
.pagination button:hover, .pagination button.active { background: #4fc3f7; color: #000; border-color: #4fc3f7; }

/* Toast */
.toast { position: fixed; top: 20px; right: 20px; padding: 12px 24px; border-radius: 8px; color: #fff; font-size: 14px; z-index: 9999; display: none; }
.toast.success { background: #2e7d32; }
.toast.error { background: #c62828; }
.toast.info { background: #1565c0; }

.empty { text-align: center; color: #666; padding: 60px 20px; font-size: 16px; }
</style>
</head>
<body>

<div class="header">
    <h1><a href="/share">几何论 - 成果分享</a></h1>
    <div class="nav">
        <a href="/share" class="active" onclick="showList()">浏览成果</a>
        <a href="/share/upload" onclick="showUpload()">上传成果</a>
        <a href="/admin">管理后台</a>
    </div>
</div>

<div class="container">
    <!-- 列表视图 -->
    <div id="listView">
        <div class="search-bar">
            <input type="text" id="searchKeyword" placeholder="搜索标题或内容..." onkeydown="if(event.key==='Enter')loadList()">
            <select id="searchCategory">
                <option value="">全部分类</option>
                <option value="几何论">几何论</option>
                <option value="物理">物理</option>
                <option value="数学">数学</option>
                <option value="推导">推导</option>
                <option value="其他">其他</option>
            </select>
            <button onclick="loadList()">搜索</button>
        </div>
        <div id="articleList" class="article-list"></div>
        <div id="pagination" class="pagination"></div>
    </div>

    <!-- 详情视图 -->
    <div id="detailView" class="detail-view">
        <span class="back-btn" onclick="showList()">&#8592; 返回列表</span>
        <h2 id="detailTitle"></h2>
        <div class="meta">
            <span id="detailAuthor"></span>
            <span id="detailCategory"></span>
            <span id="detailDate"></span>
            <span id="detailViews"></span>
            <span id="detailLikes"></span>
        </div>
        <div class="content" id="detailContent"></div>
        <button class="like-btn" onclick="likeArticle()">👍 点赞 (<span id="likeCount">0</span>)</button>
    </div>

    <!-- 上传视图 -->
    <div id="uploadView" class="upload-view">
        <h2>📤 上传你的成果</h2>
        <p style="color:#888;font-size:13px;margin-bottom:10px">提交后需要管理员审批通过才会公开展示</p>
        <label>作者/昵称 *</label>
        <input type="text" id="uploadAuthor" placeholder="你的名字或昵称" maxlength="100">
        <label>标题 *</label>
        <input type="text" id="uploadTitle" placeholder="成果标题" maxlength="200">
        <label>分类</label>
        <select id="uploadCategory">
            <option value="几何论">几何论</option>
            <option value="物理">物理</option>
            <option value="数学">数学</option>
            <option value="推导">推导</option>
            <option value="其他">其他</option>
        </select>
        <label>内容 *（支持 Markdown）</label>
        <textarea id="uploadContent" placeholder="在这里输入你的成果内容..."></textarea>
        <button class="submit-btn" onclick="submitArticle()">提交成果</button>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
var currentPage = 1;
var currentId = null;

function showToast(msg, type) {
    var t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast ' + (type || 'info');
    t.style.display = 'block';
    setTimeout(function() { t.style.display = 'none'; }, 3000);
}

function showList() {
    document.getElementById('listView').style.display = 'block';
    document.getElementById('detailView').style.display = 'none';
    document.getElementById('uploadView').style.display = 'none';
    document.querySelectorAll('.nav a').forEach(function(a) { a.classList.remove('active'); });
    document.querySelectorAll('.nav a')[0].classList.add('active');
    loadList();
}

function showUpload() {
    document.getElementById('listView').style.display = 'none';
    document.getElementById('detailView').style.display = 'none';
    document.getElementById('uploadView').style.display = 'block';
    document.querySelectorAll('.nav a').forEach(function(a) { a.classList.remove('active'); });
    document.querySelectorAll('.nav a')[1].classList.add('active');
}

function loadList() {
    var keyword = document.getElementById('searchKeyword').value;
    var category = document.getElementById('searchCategory').value;
    fetch('/api/share/list?page=' + currentPage + '&size=20&keyword=' + encodeURIComponent(keyword) + '&category=' + encodeURIComponent(category))
    .then(function(r) { return r.json(); })
    .then(function(data) {
        if (!data.success) return showToast(data.error, 'error');
        var html = '';
        if (data.items.length === 0) {
            html = '<div class="empty">暂无成果，快来上传第一个吧！</div>';
        } else {
            data.items.forEach(function(item) {
                html += '<div class="article-card" onclick="viewArticle(' + item.id + ')">';
                html += '<h3>' + escHtml(item.title) + '</h3>';
                html += '<div class="meta">';
                html += '<span>✍️ ' + escHtml(item.author) + '</span>';
                html += '<span>📁 ' + escHtml(item.category) + '</span>';
                html += '<span>📅 ' + item.created_at + '</span>';
                html += '<span>👁️ ' + item.views + '</span>';
                html += '<span>👍 ' + item.likes + '</span>';
                html += '</div></div>';
            });
        }
        document.getElementById('articleList').innerHTML = html;

        // 分页
        var totalPages = Math.ceil(data.total / data.size);
        var pagHtml = '';
        for (var i = 1; i <= totalPages; i++) {
            pagHtml += '<button class="' + (i === currentPage ? 'active' : '') + '" onclick="currentPage=' + i + ';loadList()">' + i + '</button>';
        }
        document.getElementById('pagination').innerHTML = pagHtml;
    });
}

function viewArticle(id) {
    currentId = id;
    fetch('/api/share/' + id)
    .then(function(r) { return r.json(); })
    .then(function(data) {
        if (!data.success) return showToast(data.error, 'error');
        var item = data.item;
        document.getElementById('detailTitle').textContent = item.title;
        document.getElementById('detailAuthor').textContent = '✍️ ' + item.author;
        document.getElementById('detailCategory').textContent = '📁 ' + item.category;
        document.getElementById('detailDate').textContent = '📅 ' + item.created_at;
        document.getElementById('detailViews').textContent = '👁️ ' + item.views;
        document.getElementById('detailLikes').textContent = '👍 ' + item.likes;
        document.getElementById('likeCount').textContent = item.likes;
        document.getElementById('detailContent').textContent = item.content;

        document.getElementById('listView').style.display = 'none';
        document.getElementById('detailView').style.display = 'block';
        document.getElementById('uploadView').style.display = 'none';
        window.scrollTo(0, 0);
    });
}

function likeArticle() {
    if (!currentId) return;
    fetch('/api/share/like/' + currentId, { method: 'POST' })
    .then(function(r) { return r.json(); })
    .then(function(data) {
        if (data.success) {
            var el = document.getElementById('likeCount');
            el.textContent = parseInt(el.textContent) + 1;
            showToast('已点赞', 'success');
        }
    });
}

function submitArticle() {
    var author = document.getElementById('uploadAuthor').value.trim();
    var title = document.getElementById('uploadTitle').value.trim();
    var category = document.getElementById('uploadCategory').value;
    var content = document.getElementById('uploadContent').value.trim();

    if (!author || !title || !content) {
        return showToast('请填写作者、标题和内容', 'error');
    }

    fetch('/api/share/submit', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ author: author, title: title, category: category, content: content })
    })
    .then(function(r) { return r.json(); })
    .then(function(data) {
        if (data.success) {
            showToast('提交成功！等待管理员审批', 'success');
            document.getElementById('uploadTitle').value = '';
            document.getElementById('uploadContent').value = '';
        } else {
            showToast(data.error, 'error');
        }
    });
}

function escHtml(s) {
    var d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
}

// 初始化
loadList();
</script>
</body>
</html>
