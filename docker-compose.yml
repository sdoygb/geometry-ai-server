version: "3.8"

services:
  geometry-ai:
    build: .
    image: geometry-ai-server:latest
    container_name: geometry-ai-server
    restart: unless-stopped
    ports:
      - "5000:5000"   # Geometry AI Server（管理界面 + API）
      - "8080:8080"   # Open WebUI（聊天界面）
    environment:
      # 必填：你的 DeepSeek API Key
      - KIMI_API_KEY=${KIMI_API_KEY:-sk-your-api-key-here}
      # 可选：自定义配置
      - KIMI_BASE_URL=https://api.deepseek.com/v1
      - KIMI_MODEL=deepseek-v4-pro
      - KIMI_MODEL_LITE=deepseek-v4-flash
      - KIMI_MODEL_VISION=deepseek-v4-flash
      - KIMI_EMBEDDING_MODEL=deepseek-v4-flash
      # 国内镜像加速
      - HF_ENDPOINT=https://hf-mirror.com
      - OPENAI_API_BASE_URLS=http://localhost:5000/v1
      - OPENAI_API_KEYS=not-needed
    volumes:
      # 持久化数据（知识库、配置、模型缓存）
      - geometry-data:/app/data
      - geometry-models:/app/models_cache

volumes:
  geometry-data:
  geometry-models:
