<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>几何论研究中心 - 文档库</title>
    <script>
    MathJax = {
        tex: {
            inlineMath: [['$','$'], ['\\(','\\)']],
            displayMath: [['$$','$$'], ['\\[','\\]']],
            processEscapes: false
        },
        options: {
            skipHtmlTags: ['script','noscript','style','textarea','pre','code']
        },
        startup: {
            typeset: false
        }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js" async></script>
    <style>
        :root {
            --bg: #f5f5f5;
            --sidebar-bg: #1e1e2e;
            --sidebar-text: #cdd6f4;
            --sidebar-hover: #313244;
            --sidebar-active: #45475a;
            --accent: #89b4fa;
            --text: #1e1e2e;
            --text-secondary: #6c7086;
            --border: #e0e0e0;
            --card-bg: #ffffff;
            --code-bg: #f0f0f0;
            --header-bg: #ffffff;
            --header-height: 48px;
            --sidebar-width: 300px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            height: 100vh;
            overflow: hidden;
        }

        .app {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* Header */
        header {
            height: var(--header-height);
            background: var(--header-bg);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 16px;
            gap: 12px;
            flex-shrink: 0;
            z-index: 10;
        }
        header .logo {
            font-weight: 700;
            font-size: 18px;
            color: var(--text);
            letter-spacing: -0.5px;
        }
        header .logo span {
            color: var(--accent);
        }
        header .breadcrumb {
            font-size: 13px;
            color: var(--text-secondary);
            margin-left: 8px;
        }
        header .breadcrumb a {
            color: var(--accent);
            text-decoration: none;
            cursor: pointer;
        }
        header .breadcrumb a:hover {
            text-decoration: underline;
        }

        /* Main layout */
        .main {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* Sidebar */
        .sidebar {
            width: var(--sidebar-width);
            background: var(--sidebar-bg);
            color: var(--sidebar-text);
            overflow-y: auto;
            flex-shrink: 0;
            font-size: 13px;
            padding: 8px 0;
        }
        .sidebar::-webkit-scrollbar {
            width: 6px;
        }
        .sidebar::-webkit-scrollbar-thumb {
            background: #45475a;
            border-radius: 3px;
        }

        .nav-dir-title {
            padding: 6px 12px;
            cursor: pointer;
            user-select: none;
            font-weight: 600;
            color: #a6adc8;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: background 0.15s;
        }
        .nav-dir-title:hover {
            background: var(--sidebar-hover);
        }
        .nav-dir-title .arrow {
            font-size: 10px;
            transition: transform 0.2s;
            display: inline-block;
        }
        .nav-dir-title.collapsed .arrow {
            transform: rotate(-90deg);
        }
        .nav-dir-children {
            overflow: hidden;
        }
        .nav-dir-title.collapsed + .nav-dir-children {
            display: none;
        }

        .nav-file, .nav-root-file {
            display: block;
            padding: 4px 12px;
            cursor: pointer;
            color: #bac2de;
            text-decoration: none;
            transition: background 0.15s;
            border-left: 3px solid transparent;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .nav-file:hover, .nav-root-file:hover {
            background: var(--sidebar-hover);
            color: #fff;
        }
        .nav-file.active, .nav-root-file.active {
            background: var(--sidebar-active);
            border-left-color: var(--accent);
            color: #fff;
        }

        /* Content area */
        .content {
            flex: 1;
            overflow-y: auto;
            padding: 32px 48px;
            background: var(--bg);
        }
        .content::-webkit-scrollbar {
            width: 8px;
        }
        .content::-webkit-scrollbar-thumb {
            background: #ccc;
            border-radius: 4px;
        }

        .article-container {
            max-width: 820px;
            margin: 0 auto;
        }

        /* Markdown rendered styles */
        .article-container h1 { font-size: 2em; margin: 0.67em 0; font-weight: 700; }
        .article-container h2 { font-size: 1.5em; margin: 0.83em 0; font-weight: 600; border-bottom: 1px solid var(--border); padding-bottom: 6px; }
        .article-container h3 { font-size: 1.25em; margin: 1em 0; font-weight: 600; }
        .article-container h4 { font-size: 1.1em; margin: 1em 0; font-weight: 600; }
        .article-container p { margin: 0.8em 0; }
        .article-container ul, .article-container ol { padding-left: 24px; margin: 0.6em 0; }
        .article-container li { margin: 0.2em 0; }
        .article-container blockquote {
            border-left: 4px solid var(--accent);
            padding: 8px 16px;
            margin: 12px 0;
            background: #f0f4ff;
            color: #555;
        }
        .article-container code {
            background: var(--code-bg);
            padding: 2px 6px;
            border-radius: 4px;
            font-family: "SF Mono", "Fira Code", "Fira Mono", Menlo, Consolas, monospace;
            font-size: 0.9em;
        }
        .article-container pre {
            background: #1e1e2e;
            color: #cdd6f4;
            padding: 16px;
            border-radius: 8px;
            overflow-x: auto;
            margin: 12px 0;
            font-size: 13px;
            line-height: 1.5;
        }
        .article-container pre code {
            background: none;
            padding: 0;
            color: inherit;
        }
        .article-container table {
            border-collapse: collapse;
            width: 100%;
            margin: 12px 0;
        }
        .article-container th, .article-container td {
            border: 1px solid var(--border);
            padding: 8px 12px;
            text-align: left;
        }
        .article-container th {
            background: #f0f0f0;
            font-weight: 600;
        }
        .article-container a {
            color: var(--accent);
        }
        .article-container hr {
            border: none;
            border-top: 1px solid var(--border);
            margin: 24px 0;
        }
        .article-container img {
            max-width: 100%;
            border-radius: 4px;
        }

        /* Math display */
        .math-display {
            overflow-x: auto;
            padding: 8px 0;
            text-align: center;
        }
        .math-inline {
            display: inline;
        }

        /* Loading / Empty states */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--text-secondary);
            text-align: center;
        }
        .empty-state .icon {
            font-size: 48px;
            margin-bottom: 16px;
        }
        .empty-state p {
            font-size: 15px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .sidebar {
                width: 240px;
            }
            .content {
                padding: 16px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="app">
        <header>
            <div class="logo">SD<span>517</span></div>
            <div class="breadcrumb" id="breadcrumb">
                <a onclick="location.reload()">几何论研究中心</a>
                <span id="breadcrumb-path"></span>
            </div>
        </header>
        <div class="main">
            <aside class="sidebar" id="sidebar">
                <div style="padding:12px;color:#a6adc8;font-size:12px;">加载中...</div>
            </aside>
            <main class="content" id="article-content">
                <div class="empty-state">
                    <div class="icon">📚</div>
                    <p>几何论文档库</p>
                    <p style="font-size:13px;margin-top:4px;">从左侧选择文章开始阅读</p>
                </div>
            </main>
        </div>
    </div>
    <script src="marked.min.js"></script>
    <script src="articles_data.js"></script>
    <script src="app.js"></script>
</body>
</html>
